<ion-view view-title="Measures2Go">
  <ion-content >
    <div class="list">

      <div ng-repeat="c in categories">
        <div class="item item-divider">
          {{c.name}}
        </div>

        <a class="item" ng-repeat="test in c.tests" type="item-text-wrap" href="#/test/{{test.id}}">
          {{test.name}}
        </a>
      </div>

    </div>
  </ion-content>
</ion-view>
