<ion-view view-title="Measures2Go">
  <ion-content >
    <div class="list">
      <div ng-repeat="(key, value) in categories">
        <div class="item item-divider">
          {{value.name}}
        </div>
        <a class="item" ng-repeat="test in value.tests" type="item-text-wrap" ui-sref="test-view({ id: test.slug })">
          {{test.name}}
        </a>
      </div>
    </div>
  </ion-content>
</ion-view>
